<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>世界杯 AI 预测 | 2026</title>
<style>
:root{--bg:#060b18;--card:#0e132e;--card2:#141b3a;--line:#212b50;--muted:#7d87b0;--text:#dae0ff;--gold:#f5c76b;--green:#3ece7c;--red:#ff5a6e;--blue:#6096ff}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:radial-gradient(circle at top,#1a2355 0,#060b18 42%,#03060e 100%);color:var(--text);min-height:100vh}.w{max-width:1000px;margin:0 auto;padding:18px 14px 40px}
.hero{padding:18px 0 12px}.hero .title-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.hero .tag{display:inline-flex;align-items:center;gap:6px;background:rgba(245,199,107,.12);border:1px solid rgba(245,199,107,.25);border-radius:999px;padding:5px 10px;color:var(--gold);font-size:12px;font-weight:800}.hero h1{font-size:29px;line-height:1.15;margin:10px 0 5px}.hero p{color:var(--muted);font-size:13px}.hero .tinfo{font-size:11px;color:var(--gold);margin-top:6px}.statstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0 6px}.stat{background:rgba(20,27,58,.9);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}.stat .n{font-size:22px;font-weight:950;color:var(--gold)}.stat .l{font-size:11px;color:var(--muted);margin-top:3px}
.nav{position:sticky;top:0;z-index:20;background:rgba(6,11,24,.88);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:14px;margin:8px 0 14px;padding:6px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.nav a{display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--text);padding:10px 6px;border-radius:10px;font-weight:800;font-size:13px;transition:.15s}.nav a.active,.nav a:hover{background:linear-gradient(135deg,var(--gold),#ff944d);color:#11142a}
.sec{margin-top:28px}.sechd{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;margin-bottom:10px;flex-wrap:wrap}.sechd h2{font-size:21px}.sechd .sub{color:var(--muted);font-size:12px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 10px;font-size:11px;border:1px solid var(--line);color:#cbd5ff;background:rgba(255,255,255,.04)}
.matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:10px}.mc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;position:relative;overflow:hidden}.mc:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}.mc.finished:before{background:var(--green)}.mc.live:before{background:var(--red)}.mc-head{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-bottom:10px}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}.tm{text-align:center}.flag{font-size:28px}.tm .name{font-weight:850;margin-top:3px}.scorebox{min-width:80px;text-align:center}.scorebox .main{font-size:26px;font-weight:950;color:var(--gold)}.scorebox .sub{font-size:11px;color:var(--muted)}.preds{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}.pbox{background:rgba(11,16,36,.9);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px}.pbox .mdl{font-size:11px;font-weight:900;margin-bottom:4px}.mdl.g{color:var(--green)}.mdl.d{color:var(--blue)}.pbox .sc{font-size:19px;font-weight:950}.an{color:#a0a9d0;font-size:11px;line-height:1.45;margin-top:6px}.bet{font-size:11px;color:#c8d1f8;margin-top:7px;padding-top:7px;border-top:1px dashed rgba(255,255,255,.12)}.badge{display:inline-flex;border-radius:999px;padding:2px 7px;font-size:10px;font-weight:900}.badge.pend{background:rgba(245,199,107,.14);color:var(--gold)}.badge.win{background:rgba(62,206,124,.14);color:var(--green)}.badge.lose{background:rgba(255,90,110,.14);color:var(--red)}.venue{color:var(--muted);font-size:11px;margin-top:10px}
.return-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.retcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}.retcard .mdl{font-size:12px;font-weight:900;margin-bottom:4px}.retcard .val{font-size:32px;font-weight:950;margin:6px 0 4px}.retcard .val.up{color:var(--green)}.retcard .val.down{color:var(--red)}.retcard .detail{font-size:11px;color:var(--muted)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}.btn{background:rgba(255,255,255,.04);border:1px solid var(--line);color:#cbd5ff;border-radius:999px;padding:6px 11px;font-size:12px;font-weight:800;cursor:pointer}.btn.active,.btn:hover{background:var(--gold);color:#11142a}
.slist{display:grid;gap:6px}.srow{display:grid;grid-template-columns:110px 1fr 280px;gap:12px;align-items:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}.srow .time{font-size:11px;color:var(--muted)}.srow .fix{font-weight:850}.srow .stage{font-size:11px;color:var(--muted)}.srow .comp{display:grid;grid-template-columns:1fr 1fr;gap:6px}.srow .chp{display:flex;justify-content:space-between;align-items:center;gap:6px;background:rgba(11,16,36,.9);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:5px 8px;font-size:11px}.chp .model.g{color:var(--green);font-weight:850}.chp .model.d{color:var(--blue);font-weight:850}.chp.hit{border-color:rgba(62,206,124,.4)}.chp.miss{border-color:rgba(255,90,110,.4)}.tg{font-weight:950;color:var(--green)}.tr{font-weight:950;color:var(--red)}.tx{color:var(--muted)}.empty{color:var(--muted);text-align:center;padding:30px}.footer{color:#4b547a;font-size:11px;text-align:center;padding:30px 0 10px}
@media(max-width:820px){.w{padding:12px 10px 32px}.hero h1{font-size:24px}.statstrip{grid-template-columns:repeat(2,1fr)}.matches{grid-template-columns:1fr}.preds{grid-template-columns:1fr}.return-grid{grid-template-columns:1fr}.srow{grid-template-columns:1fr;gap:8px}.srow .comp{grid-template-columns:1fr}.srow .time{grid-column:1/-1}.srow .stage{display:none}.nav a{font-size:12px;padding:9px 4px}}
</style></head><body>
<div class="w">
<header class="hero">
<div class="title-row"><span class="tag">⚽ AI World Cup Lab</span></div>
<h1>世界杯 AI 预测 2026</h1>
<p>GPT-5.5 与 DeepSeek V4 Pro 双模型独立预测 · 最近预测首屏优先 · 模拟投注仅供模型研究</p>
<div class="tinfo" id="dataTime">数据加载中...</div>
<div class="statstrip" id="stats"></div>
</header>
<nav class="nav">
<a href="#predictions" class="active">预测</a>
<a href="#returns">收益</a>
<a href="#schedule">赛程</a>
</nav>
<section class="sec" id="predictions">
<div class="sechd"><div><h2>最近预测的比赛</h2><div class="sub">最近几场 AI 的判断和理由</div></div><span class="pill" id="predCount">--</span></div>
<div class="matches" id="predictionCards"></div>
</section>
<section class="sec" id="returns">
<div class="sechd"><div><h2>AI 预测收益</h2><div class="sub">虚拟投注 100/场 · 赛果校准后自动更新</div></div></div>
<div class="return-grid" id="returnCards"></div>
</section>
<section class="sec" id="schedule">
<div class="sechd"><div><h2>赛程</h2><div class="sub">实际比分与两个模型预测结果对比，没有分析原文</div></div></div>
<div class="filters" id="scheduleFilters"></div>
<div class="slist" id="scheduleList"></div>
</section>
<div class="footer">Power by Hermes Agent · AI 预测仅供娱乐和模型研究 · 不构成投注建议</div>
</div>
<script>
const FLAGS={卡塔尔:'🇶🇦',瑞士:'🇨🇭',巴西:'🇧🇷',摩洛哥:'🇲🇦',海地:'🇭🇹',苏格兰:'🏴',澳大利亚:'🇦🇺',土耳其:'🇹🇷',墨西哥:'🇲🇽',南非:'🇿🇦',韩国:'🇰🇷',捷克:'🇨🇿',加拿大:'🇨🇦',波黑:'🇧🇦',美国:'🇺🇸',巴拉圭:'🇵🇾',阿根廷:'🇦🇷',法国:'🇫🇷',英格兰:'🏴',西班牙:'🇪🇸',德国:'🇩🇪',葡萄牙:'🇵🇹',荷兰:'🇳🇱',意大利:'🇮🇹',日本:'🇯🇵',克罗地亚:'🇭🇷',乌拉圭:'🇺🇾',比利时:'🇧🇪',塞内加尔:'🇸🇳',哥伦比亚:'🇨🇴',丹麦:'🇩🇰',伊朗:'🇮🇷',待定:'❓'};
const $=id=>document.getElementById(id); const pct=v=>v==null?'--':(Number(v)*100).toFixed(0)+'%'; const money=v=>(Number(v)>0?'+':'')+Number(v||0).toFixed(0);
function dt(s){const t=Date.parse(String(s).replace(' ','T')+'+08:00');return Number.isFinite(t)?t:0}
function statusText(m){if(m.status==='已结束')return '已结束'; if((m.predictions||[]).length)return '已预测'; return '未预测'}
function mcls(name){return String(name).includes('GPT')?'g':'d'}
function resultOf(h,a){if(h==null||a==null||h==='')return null; h=Number(h);a=Number(a); return h>a?'主胜':h<a?'客胜':'平局'}

function matchCard(m){
  const actual=m.home_score!==null&&m.home_score!==''?`${m.home_score}:${m.away_score}`:'VS';
  const live=dt(m.time)<=Date.now()&&m.status!=='已结束';
  return `<div class="mc ${m.status==='已结束'?'finished':live?'live':''}"><div class="mc-head"><span>${m.stage||''} · ${m.match_id||''}</span><span>${m.time||''}</span></div><div class="teams"><div class="tm"><div class="flag">${FLAGS[m.home]||'🏳️'}</div><div class="name">${m.home}</div></div><div class="scorebox"><div class="main">${actual}</div><div class="sub">${statusText(m)}</div></div><div class="tm"><div class="flag">${FLAGS[m.away]||'🏳️'}</div><div class="name">${m.away}</div></div></div>${predBoxes(m)}<div class="venue">${m.venue||''}</div></div>`
}
function predBoxes(m){
  const preds=m.predictions||[]; if(!preds.length)return '<div class="empty">暂无预测</div>';
  const actual=resultOf(m.home_score,m.away_score);
  return `<div class="preds">${preds.map(p=>{
    const bet=(m.bets||[]).find(b=>b.model===p.model)||{};
    const ok=actual&&p.result===actual;
    const badge=bet.status==='已盈利'?'win':bet.status==='已亏损'?'lose':'pend';
    const verdict=actual?(ok?' 命中':' 未中'):'';
    return `<div class="pbox"><div class="mdl ${mcls(p.model)}">${p.model}${verdict}</div><div class="sc">${p.home_goals}:${p.away_goals} ${p.result||''}</div><div class="an">${(p.analysis||'').slice(0,110)}${(p.analysis||'').length>110?'...':''}</div><div class="bet"><span class="badge ${badge}">${bet.status||'待结算'}</span> ${bet.item||p.result||'--'} · 赔率 ${bet.odds||'--'} · 盈亏 ${money(bet.pnl||0)}</div></div>`
  }).join('')}</div>`
}

function renderStats(matches){
  const t=matches.length,p=matches.filter(m=>(m.predictions||[]).length).length,f=matches.filter(m=>m.status==='已结束').length,o=matches.filter(m=>m.odds).length,b=matches.filter(m=>(m.bets||[]).length).length;
  $('stats').innerHTML=[['总场次',t],['已预测',p],['已结束',f],['有赔率',o],['投注模拟',b]].map(x=>`<div class="stat"><div class="n">${x[1]}</div><div class="l">${x[0]}</div></div>`).join('')
}

function renderPredictions(matches){
  const now=Date.now();
  const picked=matches.filter(m=>(m.predictions||[]).length).sort((a,b)=>{const da=Math.abs(dt(a.time)-now),db=Math.abs(dt(b.time)-now);const la=Math.max(...(a.predictions||[]).map(p=>dt(p.time)||0));const lb=Math.max(...(b.predictions||[]).map(p=>dt(p.time)||0));return da-db||lb-la}).slice(0,8);
  $('predCount').textContent=`展示 ${picked.length} 场`;
  $('predictionCards').innerHTML=picked.map(matchCard).join('')||'<div class="empty">暂无预测</div>'
}

function renderReturns(summaries){
  const s24=(summaries||[]).sort((a,b)=>Number(b.balance||0)-Number(a.balance||0));
  $('returnCards').innerHTML=s24.map(s=>`<div class="retcard"><div class="mdl ${mcls(s.model)}">${s.model}</div><div class="val ${Number(s.pnl)>0?'up':Number(s.pnl)<0?'down':''}">${money(s.balance?Number(s.balance)-10000:0)}</div><div class="detail">投注 ${s.bets||0} 次 · 命中 ${s.wins||0} 次 · ROI ${pct(s.roi)} · 余额 ${Number(s.balance||0).toFixed(0)}</div></div>`).join('')||'<div class="retcard"><div class="empty">暂无收益</div></div>'
}

function renderSchedule(matches){
  const stages=['全部',...Array.from(new Set(matches.map(m=>m.stage).filter(Boolean)))];
  $('scheduleFilters').innerHTML=stages.map((s,i)=>`<button class="btn ${i===0?'active':''}" data-stage="${s}">${s}</button>`).join('');
  const draw=stage=>{
    const list=(stage==='全部'?matches:matches.filter(m=>m.stage===stage)).slice().sort((a,b)=>dt(a.time)-dt(b.time));
    $('scheduleList').innerHTML=list.map(m=>{
      const actual=resultOf(m.home_score,m.away_score);
      const preds=m.predictions||[];
      const predHtml=preds.length?`<div class="comp">${preds.map(p=>{
        const hit=actual&&p.result===actual;
        const cls=actual?(hit?'hit':'miss'):'';
        const v=actual?(hit?'<span class="tg">命中</span>':'<span class="tr">未中</span>'):'<span class="tx">待赛果</span>';
        return `<div class="chp ${cls}"><span class="model ${mcls(p.model)}">${String(p.model).includes('GPT')?'GPT':'DeepSeek'}</span> <span>${p.home_goals}:${p.away_goals} ${p.result||''}</span>${v}</div>`
      }).join('')}</div>`:'<div class="tx">暂无预测</div>';
      const scoreHtml=m.home_score!==null&&m.home_score!==''?`<span style="color:var(--gold);font-weight:950">${m.home_score}:${m.away_score}</span>`:'<span class="tx">VS</span>';
      return `<div class="srow"><div class="time">${String(m.time||'').slice(5,16)}</div><div class="fix">${FLAGS[m.home]||''} ${m.home} ${scoreHtml} ${m.away} ${FLAGS[m.away]||''} <span class="stage">${m.stage||''}</span></div>${predHtml}</div>`
    }).join('')||'<div class="empty">暂无赛程</div>'
  };
  draw('全部');
  document.querySelectorAll('#scheduleFilters .btn').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('#scheduleFilters .btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');draw(btn.dataset.stage)})
}

fetch('data.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(payload=>{
  const m=payload.matches||[];
  $('dataTime').textContent='数据更新时间：'+(payload.generated_at||'未知');
  renderStats(m); renderPredictions(m); renderReturns(payload.bet_summary||[]); renderSchedule(m);
}).catch(e=>{$('dataTime').textContent='数据加载失败：'+e.message})
</script></body></html>
