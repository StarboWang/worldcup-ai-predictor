<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>世界杯 AI 预测 | 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e27;color:#e0e6f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1f4b,#0d1130);padding:24px 20px;text-align:center;border-bottom:2px solid #2a3060}
.header h1{font-size:28px;background:linear-gradient(90deg,#f0c060,#ff8c42);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.header p{color:#8890b8;font-size:14px}.data-time{margin-top:8px;color:#f0c060;font-size:12px}.stats{display:flex;gap:12px;padding:16px 20px;flex-wrap:wrap;justify-content:center}
.stat{background:#131844;border-radius:12px;padding:14px 20px;text-align:center;min-width:100px;border:1px solid #2a3060}.stat .num{font-size:24px;font-weight:700;color:#f0c060}.stat .lbl{font-size:12px;color:#6670a0;margin-top:4px}
.controls{display:flex;gap:8px;padding:8px 20px;flex-wrap:wrap;justify-content:center}.controls button{background:#1a2060;color:#a0b0e0;border:1px solid #2a3060;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;transition:all .2s}.controls button:hover,.controls button.active{background:#f0c060;color:#0a0e27;border-color:#f0c060}
.section{max-width:980px;margin:20px auto 0;padding:0 20px}.section-title{font-size:18px;font-weight:700;color:#f0c060;margin-bottom:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:#111636;border-radius:14px;padding:16px;border:1px solid #1e2450}.lb-card{text-align:center}.mname{font-size:14px;font-weight:600;margin-bottom:8px}.mname.gpt{color:#10a37f}.mname.ds{color:#4d94ff}.mscore{font-size:36px;font-weight:800;color:#f0c060}.mrate{font-size:12px;color:#6670a0;margin-top:4px}.profit{color:#44cc88}.loss{color:#ff6666}
.match-list{padding:12px 20px;max-width:980px;margin:0 auto}.match-card{background:#111636;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #1e2450;transition:all .2s}.match-card.predicted{border-left:3px solid #f0c060}.match-card.finished{border-left:3px solid #44cc88}.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.match-stage{font-size:11px;color:#6670a0;background:#1a1f4b;padding:3px 8px;border-radius:4px}.match-time{font-size:12px;color:#8890b8}.teams-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:12px}.team{text-align:center}.team .flag{font-size:32px;margin-bottom:4px}.team .name{font-size:16px;font-weight:600}.score-center{text-align:center}.score-center .score{font-size:28px;font-weight:800;color:#f0c060}.score-center .vs{font-size:12px;color:#6670a0}
.odds-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.odds-box{background:#0d1130;border:1px solid #27305d;border-radius:10px;padding:8px;text-align:center}.odds-box .label{font-size:11px;color:#6670a0}.odds-box .val{font-size:18px;color:#f0c060;font-weight:700}.odds-note{font-size:11px;color:#6670a0;margin-bottom:8px}
.predictions{margin-top:12px}.pred-title{font-size:12px;color:#6670a0;margin-bottom:8px}.pred-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pred-box{background:#0d1130;border-radius:10px;padding:10px 12px;border:1px solid #1e2450}.pred-box .model{font-size:12px;font-weight:600;margin-bottom:4px}.pred-box .model.gpt{color:#10a37f}.pred-box .model.ds{color:#4d94ff}.pred-box .pred-score{font-size:18px;font-weight:700;margin-bottom:4px}.pred-box .analysis{font-size:11px;color:#8890b8;margin-top:6px;line-height:1.5}.pred-box.correct{border-color:#44cc88;background:#0a2a1a}.pred-box.wrong{border-color:#ff5555;background:#2a0a0a}
.bet-box{margin-top:8px;background:#111636;border-radius:8px;padding:8px;border:1px dashed #2a3060}.bet-line{font-size:12px;color:#c8d0f0;margin-bottom:4px}.bet-reason{font-size:11px;color:#8890b8;line-height:1.4}.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;background:#26315f;color:#c8d0f0}.badge.win{background:#0a3a23;color:#66e0a3}.badge.lose{background:#3a1010;color:#ff7777}.badge.pending{background:#3a3210;color:#f0c060}
.match-venue{font-size:11px;color:#556090;margin-top:8px}.empty-state{text-align:center;padding:40px;color:#6670a0}footer{text-align:center;padding:20px;color:#445080;font-size:11px;border-top:1px solid #1e2450;margin-top:20px}@media(max-width:760px){.grid2,.pred-grid{grid-template-columns:1fr}.odds-row{grid-template-columns:1fr 1fr 1fr}.section,.match-list{padding-left:12px;padding-right:12px}}
</style>
</head><body>
<div class="header"><h1>AI 世界杯预测 2026</h1><p>GPT-5.5 × DeepSeek V4 Pro · 增强策略 + 模拟投注战绩</p><div class="data-time" id="dataTime">数据加载中...</div></div>
<div class="stats" id="stats"></div>
<div class="controls" id="controls"><button class="active" data-filter="all">全部</button><button data-filter="小组赛第1轮">小组赛第1轮</button><button data-filter="小组赛第2轮">小组赛第2轮</button><button data-filter="小组赛第3轮">小组赛第3轮</button><button data-filter="1/16决赛">1/16决赛</button><button data-filter="1/8决赛">1/8决赛</button><button data-filter="1/4决赛">1/4决赛</button><button data-filter="半决赛">半决赛</button><button data-filter="决赛">决赛</button></div>
<div class="section" id="lb"></div><div class="section" id="betSummary"></div><div class="match-list" id="matches"></div>
<footer>AI 预测与模拟投注仅供娱乐和模型研究 · 不构成任何真实投注建议 · 赔率若标注“内部估算”则不是博彩公司真实赔率 · Powered by Hermes Agent</footer>
<script>
const FLAGS={卡塔尔:'🇶🇦',瑞士:'🇨🇭',巴西:'🇧🇷',摩洛哥:'🇲🇦',海地:'🇭🇹',苏格兰:'🏴',澳大利亚:'🇦🇺',土耳其:'🇹🇷',墨西哥:'🇲🇽',南非:'🇿🇦',韩国:'🇰🇷',捷克:'🇨🇿',加拿大:'🇨🇦',波黑:'🇧🇦',美国:'🇺🇸',巴拉圭:'🇵🇾',阿根廷:'🇦🇷',法国:'🇫🇷',英格兰:'🏴',西班牙:'🇪🇸',德国:'🇩🇪',葡萄牙:'🇵🇹',荷兰:'🇳🇱',意大利:'🇮🇹',日本:'🇯🇵',克罗地亚:'🇭🇷',乌拉圭:'🇺🇾',比利时:'🇧🇪',塞内加尔:'🇸🇳',哥伦比亚:'🇨🇴',丹麦:'🇩🇰',伊朗:'🇮🇷',待定:'❓'};
const pct=v=>v==null?'--':(v*100).toFixed(0)+'%'; const money=v=>(v>0?'+':'')+(v||0).toFixed(0); const clsP=v=>v>0?'profit':v<0?'loss':'';
fetch('data.json?v='+Date.now(), {cache:'no-store'}).then(r=>r.json()).then(payload=>{const matches=payload.matches||payload; const summaries=payload.bet_summary||[]; document.getElementById('dataTime').textContent='数据更新时间：'+(payload.generated_at||'未知')+' · 若未变化请刷新页面'; let predicted=0,finished=0,odds=0,bets=0,total=matches.length; matches.forEach(m=>{if(m.predictions.length)predicted++;if(m.status==='已结束')finished++;if(m.odds)odds++;if(m.bets&&m.bets.length)bets++;});
document.getElementById('stats').innerHTML=`<div class="stat"><div class="num">${total}</div><div class="lbl">总场次</div></div><div class="stat"><div class="num">${predicted}</div><div class="lbl">已预测</div></div><div class="stat"><div class="num">${finished}</div><div class="lbl">已结束</div></div><div class="stat"><div class="num">${odds}</div><div class="lbl">有赔率</div></div><div class="stat"><div class="num">${bets}</div><div class="lbl">有投注模拟</div></div>`;
let lb={};matches.forEach(m=>{m.predictions.forEach(p=>{let mdl=p.model.includes('GPT')?'GPT-5.5':p.model.includes('DeepSeek')?'DeepSeek V4 Pro':p.model;if(!lb[mdl]) lb[mdl]={score:0,total:0,correct:0,exact:0};lb[mdl].total++;if(p.score)lb[mdl].score+=parseInt(p.score)||0;let ar=m.home_score!==null&&m.home_score!==''?(parseInt(m.home_score)>parseInt(m.away_score)?'主胜':parseInt(m.home_score)<parseInt(m.away_score)?'客胜':'平局'):null;if(ar){if(p.result===ar)lb[mdl].correct++;if(parseInt(p.home_goals)===parseInt(m.home_score)&&parseInt(p.away_goals)===parseInt(m.away_score))lb[mdl].exact++;}})});
document.getElementById('lb').innerHTML=`<div class="section-title">模型预测排行榜</div><div class="grid2">${Object.entries(lb).map(([name,d])=>`<div class="card lb-card"><div class="mname ${name.includes('GPT')?'gpt':'ds'}">${name}</div><div class="mscore">${d.score>0?'+'+d.score:d.score}</div><div class="mrate">预测 ${d.total} 场 · 胜平负命中 ${d.correct} 场 · 比分命中 ${d.exact} 场</div></div>`).join('')}</div>`;
document.getElementById('betSummary').innerHTML=`<div class="section-title">模拟投注战绩</div><div class="grid2">${summaries.map(s=>`<div class="card lb-card"><div class="mname ${s.model.includes('GPT')?'gpt':'ds'}">${s.model}</div><div class="mscore ${clsP(s.pnl)}">${money(s.pnl)}</div><div class="mrate">投注 ${s.bets} 次 · 命中 ${s.wins} 次 · ROI ${pct(s.roi)} · 当前余额 ${s.balance.toFixed(0)}</div></div>`).join('')||'<div class="card">暂无投注战绩</div>'}</div>`;
function render(filter){let filtered=filter==='all'?matches:matches.filter(m=>m.stage===filter);let html='';if(!filtered.length)html='<div class="empty-state">暂无比赛</div>';filtered.forEach(m=>{let actual=m.home_score!==null&&m.home_score!==''?`${m.home_score}:${m.away_score}`:null;let cls=m.status==='已结束'?'finished':'predicted';html+=`<div class="match-card ${cls}"><div class="match-header"><span class="match-stage">${m.stage}</span><span class="match-time">${m.time}</span></div><div class="teams-row"><div class="team"><div class="flag">${FLAGS[m.home]||'❓'}</div><div class="name">${m.home}</div></div><div class="score-center">${actual?`<div class="score">${actual}</div>`:`<div class="vs">VS</div>`}</div><div class="team"><div class="flag">${FLAGS[m.away]||'❓'}</div><div class="name">${m.away}</div></div></div>`;
if(m.odds){html+=`<div class="odds-note">赔率：${m.odds.bookmaker||''} · ${m.odds.source||''} · ${m.odds.updated_at||''}</div><div class="odds-row"><div class="odds-box"><div class="label">主胜</div><div class="val">${m.odds.home_odds||'--'}</div><div class="label">隐含 ${pct(m.odds.home_imp)}</div></div><div class="odds-box"><div class="label">平局</div><div class="val">${m.odds.draw_odds||'--'}</div><div class="label">隐含 ${pct(m.odds.draw_imp)}</div></div><div class="odds-box"><div class="label">客胜</div><div class="val">${m.odds.away_odds||'--'}</div><div class="label">隐含 ${pct(m.odds.away_imp)}</div></div></div>`}
if(m.predictions.length){html+=`<div class="predictions"><div class="pred-title">AI 预测与虚拟投注</div><div class="pred-grid">`;m.predictions.forEach(p=>{let ar=actual?(parseInt(m.home_score)>parseInt(m.away_score)?'主胜':parseInt(m.home_score)<parseInt(m.away_score)?'客胜':'平局'):null;let isCorrect=ar?p.result===ar:null;let isExact=ar&&parseInt(p.home_goals)===parseInt(m.home_score)&&parseInt(p.away_goals)===parseInt(m.away_score);let boxCls=ar?(isCorrect?'correct':'wrong'):'';let modelName=p.model.includes('GPT')?'GPT-5.5':p.model.includes('DeepSeek')?'DeepSeek V4 Pro':p.model;let bet=(m.bets||[]).find(b=>b.model===p.model)||{};let badge=bet.status==='已盈利'?'win':bet.status==='已亏损'?'lose':'pending';html+=`<div class="pred-box ${boxCls}"><div class="model ${modelName.includes('GPT')?'gpt':'ds'}">${modelName}</div><div class="pred-score">${p.home_goals}:${p.away_goals} <span style="font-size:12px;color:#6670a0">${p.result||''}</span></div><div class="analysis">${(p.analysis||'').slice(0,150)}${p.analysis&&p.analysis.length>150?'...':''}</div>${isExact?'<div style="color:#44cc88;font-size:11px;margin-top:4px">✅ 比分完全命中</div>':isCorrect?'<div style="color:#44cc88;font-size:11px;margin-top:4px">✅ 胜平负命中</div>':(ar&&!isCorrect?'<div style="color:#ff5555;font-size:11px;margin-top:4px">❌ 预测错误</div>':'')}<div class="bet-box"><div class="bet-line"><span class="badge ${badge}">${bet.status||'待结算'}</span> 投注：${bet.item||'--'} · 赔率 ${bet.odds||'--'} · 金额 ${bet.stake||0} · 盈亏 <span class="${clsP(bet.pnl||0)}">${money(bet.pnl||0)}</span></div><div class="bet-reason">${bet.reason||''}</div></div></div>`});html+=`</div></div>`}html+=`<div class="match-venue">${m.venue}</div></div>`});document.getElementById('matches').innerHTML=html}
render('all');document.querySelectorAll('.controls button').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render(btn.dataset.filter)}));});
</script></body></html>
